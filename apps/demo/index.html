<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpringSVG Demo</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: #0a0a0a;
        font-family: sans-serif;
        color: white;
      }
      svg {
        cursor: pointer;
        overflow: visible;
      }
      p {
        opacity: 0.5;
        font-size: 14px;
        margin-top: 24px;
      }
    </style>
  </head>
  <body>
    <svg width="200" height="200" viewBox="0 0 100 100">
      <path id="shape" d="M 50 10 L 90 90 L 10 90 Z" fill="none" stroke="white" stroke-width="2"/>
    </svg>
    <p id="label">click to morph</p>

    <div style="margin-top: 48px; display: flex; flex-direction: column; align-items: center;">
      <svg id="menu" width="80" height="80" viewBox="0 0 100 100" style="cursor:pointer; overflow:visible;">
        <path id="bar1" d="M 20 30 L 80 30" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
        <path id="bar2" d="M 20 50 L 80 50" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
        <path id="bar3" d="M 20 70 L 80 70" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
      </svg>
      <p id="menuLabel">click to toggle</p>
    </div>

    <div style="margin-top: 48px; display: flex; flex-direction: column; align-items: center;">
      <svg id="playPause" width="80" height="80" viewBox="0 0 100 100" style="cursor:pointer; overflow:visible;">
        <path id="playLeft"  d="M 32 22 L 55 36 L 55 64 L 32 78 Z" fill="white"/>
        <path id="playRight" d="M 55 36 L 78 50 L 55 64 Z"          fill="white"/>
      </svg>
      <p id="playLabel">click to pause</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
